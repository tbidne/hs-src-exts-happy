name: ci

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  cabal:
    strategy:
      fail-fast: false
      matrix:
        ghc:
          - "9.12.2"
          - "9.14.1"
        os:
          - "macos-latest"
          - "ubuntu-latest"
          - "windows-latest"
        proj:
          - "cabal.bad.project"
          - "cabal.good.project"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}

      - name: Compile good
        run: cabal build --project-file ${{ matrix.proj }}
